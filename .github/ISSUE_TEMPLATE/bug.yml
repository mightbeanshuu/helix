name: Bug report
description: Something is broken
title: 'bug: '
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened
      description: Describe the behaviour you saw vs. what you expected.
    validations: { required: true }
  - type: textarea
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce. The smaller the better.
    validations: { required: true }
  - type: textarea
    attributes:
      label: Environment
      description: |
        ```
        pnpm --version
        node --version
        os
        ```
    validations: { required: true }
  - type: textarea
    attributes:
      label: Logs
      render: shell
