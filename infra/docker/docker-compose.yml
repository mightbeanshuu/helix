name: helix

services:
  neo4j:
    image: neo4j:5.23-community
    restart: unless-stopped
    ports:
      - '7474:7474' # browser
      - '7687:7687' # bolt
    environment:
      NEO4J_AUTH: neo4j/helixhelix
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_dbms_memory_heap_initial__size: 1G
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ['CMD-SHELL', "cypher-shell -u neo4j -p helixhelix 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    ports:
      - '6333:6333' # REST
      - '6334:6334' # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:6333/readyz']
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory',
        '512mb',
        '--maxmemory-policy',
        'allkeys-lru',
      ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 6

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: helix
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: helixhelix
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U helix -d helix']
      interval: 5s
      timeout: 3s
      retries: 6

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  redis-data:
  postgres-data:
